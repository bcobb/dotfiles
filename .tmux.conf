# C-t is the tmux prefix
set -g prefix C-t
unbind C-b
bind C-t send-prefix

# Moar history
set-option -g history-limit 5000

# Nice colors
set -g default-terminal "xterm-256color"
set-option -g xterm-keys on

# Reload the config
unbind r
bind-key r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

# Autorename windows
set -g automatic-rename on

# Status bar content
set -g status-interval 5
set -g status-left ' TM '
set -g status-right '#[fg=default]%H:%M %Z'
set -g status-right-length 100

# Status bar styling
set -g status-bg colour235 # very dark grey
set -g status-fg colour7 # light grey
set -g status-position bottom

set -g window-status-format "#[fg=colour7,bg=colour234] #I #W "
set -g window-status-current-format "#[fg=colour155,bg=colour234] #I #W "

set -g base-index 1
set -g pane-base-index 1

# Show activity in other windows
set -g monitor-activity on

# Messages
set -g display-time 3000

# Clock
set -g clock-mode-style 12
set -g clock-mode-colour colour155 # yellow

# Mouse
set -g mouse on

# VI Bindings
set -g mode-keys vi

# Tab Navigation
bind -n S-left prev
bind -n S-right next
bind -n C-S-left swap-window -t -1
bind -n C-S-right swap-window -t +1

# hsplit
unbind %
bind | split-window -h -c "#{pane_current_path}"

# vsplit
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# new window
bind c new-window -c "#{pane_current_path}"

# Panes
unbind space
bind tab next-layout
unbind C-o
bind r rotate-window

# use the vim motion keys to move between panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind ^A select-pane -t :.+
